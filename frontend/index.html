<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary SEO -->
    <title>GlamStore Kenya – Perfumes, Hair, Beauty & Fashion</title>
    <meta name="description" content="Shop perfumes, human hair, waxing, microblading, stick-ons, and fashion for women, men, girls & boys. Fast delivery across all 47 counties in Kenya." />
    <meta name="keywords" content="perfumes kenya, human hair nairobi, microblading kenya, waxing, ladies clothes, men fashion, girls dresses, online shopping kenya" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="GlamStore Kenya" />
    <link rel="canonical" href="https://glamstore.co.ke" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://glamstore.co.ke" />
    <meta property="og:title" content="GlamStore Kenya – Perfumes, Hair, Beauty & Fashion" />
    <meta property="og:description" content="Your ultimate beauty and fashion destination in Kenya. Shop online & pick up in your county." />
    <meta property="og:image" content="/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GlamStore Kenya" />
    <meta name="twitter:description" content="Shop perfumes, hair, beauty services & fashion in Kenya." />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts: Playfair Display + Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/styles/main.css" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "GlamStore Kenya",
      "description": "Beauty and fashion online store in Kenya",
      "url": "https://glamstore.co.ke",
      "telephone": "+254700000000",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "KE",
        "addressLocality": "Nairobi"
      },
      "sameAs": [
        "https://www.instagram.com/glamstoreke",
        "https://www.facebook.com/glamstoreke"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Bootstrap Bundle JS -->

    <!-- React App Entry -->
    <script type="module" src="/src/main.jsx"></script>

</html>
